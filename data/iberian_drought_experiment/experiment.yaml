name: iberian_droughts
geojson: iberian_peninsula.json
downloaders:
    start-date: 2005-01-01
    end-date: 2024-12-31
    classes:
        modis_ndvi: {}
        era5:
            variables:
                - full_name: 2m_temperature
                  short_name: t2m
                - full_name: total_precipitation
                  short_name: tp
                - full_name: volumetric_soil_water_layer_2
                  short_name: swvl2
                - full_name: volumetric_soil_water_layer_3
                  short_name: swvl3
                - full_name: potential_evaporation
                  short_name: pev
name_map:
    2m_temperature: temperature
    total_precipitation: precipitation
    potential_evaporation: evaporation
    volumetric_soil_water_layer_2: soil_moisture_7_to_28_cm
    volumetric_soil_water_layer_3: soil_moisture_28_to_100_cm
    modis_ndvi: ndvi
reference_var: ndvi
columns:
    - name: temperature
      shift: 0
    - name: precipitation
      shift: 0
    - name: evaporation
      shift: 0
    - name: soil_moisture_7_to_28_cm
      shift: 0
    - name: soil_moisture_28_to_100_cm
      shift: 0
    - name: ndvi
      shift: -1
    - name: month_sin
      shift: 0
    - name: month_cos
      shift: 0
 